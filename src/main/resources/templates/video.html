<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video - Nhóm 12</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #f1f5f9;
            position: relative;
            min-height: 100vh;
        }

        /* Hiệu ứng nền động */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.08), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.75) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.8rem 0;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(120deg, #e0f2fe, #7dd3fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent !important;
            letter-spacing: -0.5px;
        }

        .btn-custom {
            background: linear-gradient(95deg, #0ea5e9, #3b82f6);
            color: white;
            border-radius: 40px;
            padding: 8px 24px;
            font-weight: 600;
            border: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            background: linear-gradient(95deg, #0284c7, #2563eb);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            color: white;
        }

        /* Container video - căn giữa */
        .video-container {
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding-top: 100px;
            padding-bottom: 50px;
        }

        /* Section title */
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
            color: #f1f5f9;
        }

        .section-title:after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #3b82f6);
            border-radius: 3px;
        }

        /* Video trực tiếp - không khung */
        iframe {
            border-radius: 16px;
            width: 100%;
            aspect-ratio: 16 / 9;
            max-width: 900px;
            height: auto;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            border: none;
            display: block;
            margin: 0 auto;
        }

        /* Footer */
        .footer {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem 0;
            text-align: center;
            margin-top: 3rem;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 1.6rem;
            }
            .btn-custom {
                padding: 6px 18px;
                font-size: 0.9rem;
            }
            .video-container {
                padding-top: 80px;
                padding-left: 1rem;
                padding-right: 1rem;
            }
            iframe {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">NHÓM 12</a>
        <div>
            <a class="btn btn-custom me-2" href="/">Trang chủ</a>
            <a class="btn btn-custom me-2" href="/noidung">Nội dung</a>
            <a class="btn btn-custom" href="/video">Video</a>
        </div>
    </div>
</nav>

<!-- VIDEO CONTENT - Chỉ video, không khung bên ngoài -->
<div class="container video-container">
    <h2 class="section-title">
        <i class="bi bi-camera-video-fill me-2"></i>Video dự án
    </h2>

    <iframe 
        src="https://drive.google.com/file/d/18KJRIhZH9mLHz0Nn6T5UXCZsDEjEGp16/preview" 
        allow="autoplay"
        allowfullscreen>
    </iframe>
</div>

<!-- FOOTER -->
<div class="footer">
    <div class="container">
        <span>© 2025 Nhóm 12 - Báo cáo Kỹ năng mềm</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
